<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotoriko | Elite Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <header>
        <div class="menu-btn" id="menu-toggle">☰</div>
        <a href="#" class="logo">SOTORIKO</a>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="nav-links">
            <div class="nav-item" data-section="auth">🏠 Главная</div>
            <div class="nav-dropdown">
                <div class="nav-item dropdown-toggle">🛡️ Админ-панель <span class="arrow">▼</span></div>
                <div class="dropdown-menu">
                    <div class="nav-item sub-item" data-section="role-creation">∟ Создание ролей</div>
                    <div class="nav-item sub-item" data-section="requests">∟ Просмотр заявок</div>
                </div>
            </div>
        </div>

        <div class="user-section" id="user-btn">
            <div class="avatar"></div>
            <div class="user-info-brief">
                <span>Sotoriko</span>
                <span class="user-role-tag">DEVELOPER</span>
            </div>
            <div class="account-popup" id="account-popup">
                <p style="color:#00d2ff; font-size:0.8rem;">Профиль игрока</p>
                <div class="popup-item">📅 Регистрация: 21.04.2026</div>
                <hr style="border:0; border-top:1px solid #222; margin:10px 0;">
                <a href="#" class="popup-item" style="color:#ff4b2b;">Выход</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="content-section" id="auth-section">
            <div id="login-view">
                <h3 style="color:#00d2ff; margin-bottom:20px;">Авторизация</h3>
                <div class="form-group">
                    <input type="text" placeholder="Никнейм">
                    <input type="password" placeholder="Пароль">
                    <button class="btn-action">Войти</button>
                </div>
                <p style="margin-top:15px; font-size:0.8rem; color:#8892b0;">
                    Нет аккаунта? <span style="color:#00d2ff; cursor:pointer; text-decoration:underline;" onclick="switchAuth('request')">Подать заявку</span>
                </p>
            </div>
            <div id="request-view" class="hidden">
                <h3 style="color:#00d2ff; margin-bottom:20px;">Регистрация</h3>
                <div class="form-group">
                    <input type="text" id="reg-nick" placeholder="Ваш никнейм">
                    <input type="text" id="reg-contact" placeholder="Discord или TG">
                    <button class="btn-action" onclick="submitRequest()">Отправить</button>
                </div>
                <p style="margin-top:15px; font-size:0.8rem; color:#8892b0; cursor:pointer;" onclick="switchAuth('login')">Назад</p>
            </div>
        </section>

        <section class="content-section hidden" id="role-creation-section">
            <h3 style="color:#00d2ff;">Создание ролей</h3>
            <div style="margin-top:20px;">
                <input type="color" id="role-color" style="height:50px; cursor:pointer;">
                <input type="text" placeholder="Название роли">
                <button class="btn-action">Сохранить</button>
            </div>
        </section>

        <section class="content-section hidden" id="requests-section">
            <h3 style="color:#00d2ff;">Активные заявки</h3>
            <p style="margin-top:20px; color:#8892b0;">Список пуст...</p>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
