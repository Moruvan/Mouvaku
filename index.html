<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotoriko | Head Helper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <header>
            <div class="profile-header">
                <h1>Sotoriko</h1>
                <p class="role">Head Helper</p>
            </div>
        </header>

        <section class="socials">
            <a href="#" class="btn">Spotify</a>
            <a href="#" class="btn">Discord</a>

        </section>

        <section class="warns">
            <h2>Лог предупреждений (Manual)</h2>

                <thead>
                    <tr>
                        <th>Нарушитель</th>
                        <th>Причина</th>
                        <th>Статус</th>

                <tbody id="warn-table">
                    <tr>
                        <td>User#0001</td>
                        <td>Flood</td>
                        <td class="status-active">Active</td>
                    </tr>
                </tbody>
            </table>
        </section>
