<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotoriko | Dashboard</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">SOTORIKO<span>.FUN</span></div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">⚙️ Настроить</a>
                <a href="#" class="nav-item" onclick="alert('Вкладка в разработке')">🔗 Ссылки</a>
                <a href="#" class="nav-item" onclick="alert('Вкладка в разработке')">🎨 Шаблоны</a>
            </nav>
            <div class="sidebar-footer">
                <a href="sotoriko.html" target="_blank" class="btn-preview">Открыть визитку ↗</a>
                <button class="btn-save" onclick="saveAllSettings()">Сохранить всё</button>
            </div>
        </aside>

        <main class="content-area">
            
            <section class="settings-section">
                <h2 class="section-title">Загрузка медиа</h2>
                <div class="media-grid">
                    <div class="upload-box">
                        <span class="box-label">Фон (URL картинки или GIF)</span>
                        <input type="text" id="bg-url" placeholder="https://...">
                    </div>
                    <div class="upload-box">
                        <span class="box-label">Аудио (URL .mp3)</span>
                        <input type="text" id="audio-url" placeholder="https://...">
                    </div>
                    <div class="upload-box">
                        <span class="box-label">Аватар профиля</span>
                        <input type="text" id="avatar-url" placeholder="https://...">
                    </div>
                </div>
            </section>

            <section class="settings-section">
                <h2 class="section-title">Общие настройки</h2>
                <div class="general-grid">
                    <div class="input-group full-width">
                        <label>Описание (Bio)</label>
                        <textarea id="bio-text" rows="2" placeholder="Напиши что-нибудь о себе..."></textarea>
                    </div>
                    
                    <div class="input-group">
                        <label>Местоположение</label>
                        <input type="text" id="location-text" placeholder="Например: MegaDubinkaCity">
                    </div>

                    <div class="input-group sliders">
                        <div class="slider-container">
                            <label>Прозрачность профиля: <span id="opacity-val">50</span>%</label>
                            <input type="range" id="card-opacity" min="0" max="100" value="50">
                        </div>
                        <div class="slider-container">
                            <label>Размытие фона: <span id="blur-val">20</span>px</label>
                            <input type="range" id="card-blur" min="0" max="50" value="20">
                        </div>
                    </div>
                </div>
            </section>

            <section class="settings-section">
                <h2 class="section-title">Настройка цветов</h2>
                <div class="color-grid">
                    <div class="color-picker-box">
                        <label>Акцентный цвет</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color-accent" value="#00d2ff">
                            <span class="color-hex" id="hex-accent">#00d2ff</span>
                        </div>
                    </div>
                    <div class="color-picker-box">
                        <label>Цвет текста</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color-text" value="#ffffff">
                            <span class="color-hex" id="hex-text">#ffffff</span>
                        </div>
                    </div>
                    <div class="color-picker-box">
                        <label>Цвет фона карточки</label>
                        <div class="color-input-wrapper">
                            <input type="color" id="color-bg" value="#0a192f">
                            <span class="color-hex" id="hex-bg">#0a192f</span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="settings-section">
                <h2 class="section-title">Другие настройки</h2>
                <div class="toggles-grid">
                    <label class="toggle-row">
                        <span class="toggle-label">Монохромные иконки</span>
                        <input type="checkbox" id="toggle-mono">
                        <span class="slider round"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-label">Анимированный заголовок</span>
                        <input type="checkbox" id="toggle-anim" checked>
                        <span class="slider round"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-label">Регулятор громкости плеера</span>
                        <input type="checkbox" id="toggle-volume" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </section>

        </main>
    </div>
    <script src="js/admin.js"></script>
</body>
</html>
