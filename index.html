<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sotoriko | Elite Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <header>
        <div class="menu-btn" id="menu-toggle">☰</div>
        <a href="#" class="logo">SOTORIKO</a>
    </header>

    <nav class="sidebar" id="sidebar">
        <div class="nav-links">
            <div class="nav-item" data-section="auth">🏠 Главная</div>
            <div class="nav-item" data-section="admin">🛡️ Управление (Админка)</div>
            <div class="nav-item">📊 Активность</div>
        </div>

        <div class="user-section" id="user-btn">
            <div class="avatar"></div>
            <div class="user-info-brief">
                <span id="display-name">Sotoriko</span>
                <span class="user-role-tag">DEVELOPER</span>
            </div>
            
            <div class="account-popup" id="account-popup">
                <p class="popup-title">Профиль игрока</p>
                <div class="popup-item">📅 Регистрация: 21.04.2026</div>
                <div class="popup-item">⚙️ Настройки</div>
                <hr class="separator">
                <a href="#" class="popup-item logout">Выйти из системы</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="stats-grid">
            <div class="stat-card">
                <h4>Пользователи</h4>
                <p>1,248</p>
            </div>
            <div class="stat-card">
                <h4>Активные роли</h4>
                <p>12</p>
            </div>
        </section>

        <section class="content-section" id="auth-section">
            <h3>Авторизация</h3>
            <div class="form-group">
                <input type="text" placeholder="Никнейм">
                <input type="password" placeholder="Пароль">
                <button class="btn-action">Войти</button>
            </div>
        </section>

        <section class="content-section hidden" id="admin-section">
            <h3 class="neon-text">Создание ролей</h3>
            <p class="sub-text">Настройка цвета и градиента</p>
            <div class="role-creator">
                <input type="color" id="role-color" value="#00d2ff">
                <input type="text" placeholder="Название роли">
                <button class="btn-action">Создать роль</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
