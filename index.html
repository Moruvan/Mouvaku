<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOTORIKO</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Боковое меню -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>SOTORIKO</h2>
            <button id="closeSidebar" class="close-btn">&times;</button>
        </div>
        
        <div class="sidebar-content">
            <!-- Админ-секция (видна только админам) -->
            <div class="menu-section admin-only" style="display: none;">
                <h3>Админ-панель</h3>
                <button class="menu-btn" onclick="openAdminPanel()">
                    <span>👑</span> Управление пользователями
                </button>
                <button class="menu-btn" onclick="openRequests()">
                    <span>📋</span> Заявки на регистрацию
                </button>
            </div>
            
            <!-- Настройки -->
            <div class="menu-section">
                <h3>Настройки</h3>
                <button class="menu-btn" onclick="openDesignSettings()">
                    <span>🎨</span> Настройка дизайна
                </button>
                <button class="menu-btn" onclick="openProfileSettings()">
                    <span>⚙️</span> Настройки профиля
                </button>
            </div>
            
            <!-- Участники -->
            <div class="menu-section">
                <h3>Участники</h3>
                <button class="menu-btn" onclick="openMembersList()">
                    <span>👥</span> Список участников
                </button>
            </div>
        </div>
        
        <!-- Виджет профиля пользователя (внизу меню) -->
        <div class="user-profile-widget" id="userWidget">
            <img src="https://i.pravatar.cc/150?img=1" alt="Avatar" class="user-avatar" id="userAvatar">
            <div class="user-info">
                <div class="user-name" id="userName">Username</div>
                <div class="user-role" id="userRole">User</div>
            </div>
        </div>
    </div>

    <!-- Выпадающее меню профиля -->
    <div class="profile-menu" id="profileMenu">
        <div class="profile-menu-item">
            <strong>Дата регистрации:</strong>
            <span id="regDate">01.01.2024</span>
        </div>
        <div class="profile-menu-item">
            <strong>Статус:</strong>
            <span id="userStatus">Активен</span>
        </div>
        <button class="profile-menu-btn" onclick="openSettings()">⚙️ Настройки</button>
        <button class="profile-menu-btn logout" onclick="logout()">🚪 Выйти</button>
    </div>

    <!-- Кнопка открытия меню (гамбургер) -->
    <button id="menuToggle" class="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Логотип (виден всегда) -->
    <div class="logo">SOTORIKO</div>

    <!-- Форма авторизации -->
    <div id="authContainer" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Авторизация</h2>
            
            <form id="authForm">
                <input type="text" id="username" placeholder="Никнейм" required autocomplete="username">
                <input type="password" id="password" placeholder="Пароль" required autocomplete="current-password">
                
                <!-- Поля для регистрации (скрыты по умолчанию) -->
                <div id="registerFields">
                    <select id="socialType" required>
                        <option value="">Выберите соц. сеть</option>
                        <option value="discord">Discord</option>
                        <option value="telegram">Telegram</option>
                        <option value="vk">VK</option>
                    </select>
                    <input type="text" id="socialContact" placeholder="Ник/ID в соц. сети" required>
                </div>
                
                <button type="submit" class="auth-btn" id="authBtn">ВОЙТИ</button>
            </form>
            
            <div class="auth-footer">
                <span id="authSwitchText">Нет аккаунта?</span>
                <a href="#" id="authSwitch">Подать заявку</a>
            </div>
        </div>
    </div>

    <!-- Главная страница (после авторизации) -->
    <div id="mainContent" class="main-content">
        <div class="container">
            <h1>Добро пожаловать, <span id="welcomeUser"></span>!</h1>
            
            <!-- Поиск и фильтр -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Поиск участников..." class="search-input">
                <select id="roleFilter" class="role-filter">
                    <option value="all">Все роли</option>
                    <option value="Администратор">Администратор</option>
                    <option value="Модератор">Модератор</option>
                    <option value="VIP">VIP</option>
                    <option value="Пользователь">Пользователь</option>
                </select>
            </div>
            
            <!-- Сетка участников -->
            <div class="members-grid" id="membersGrid">
                <!-- Карточки участников добавляются через JS -->
            </div>
        </div>
    </div>

    <!-- Модальное окно: Настройки дизайна -->
    <div id="designModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('designModal').style.display='none'">&times;</span>
            <h2>🎨 Настройка дизайна</h2>
            
            <div class="design-settings">
                <div class="setting-group">
                    <label>Цвет фона:</label>
                    <input type="color" id="bgColor" value="#0a1628">
                </div>
                
                <div class="setting-group">
                    <label>Градиент:</label>
                    <input type="color" id="gradientStart" value="#0a1628">
                    <input type="color" id="gradientEnd" value="#1a2847">
                    <select id="gradientDirection">
                        <option value="to bottom">Сверху вниз</option>
                        <option value="to right">Слева направо</option>
                        <option value="135deg">Диагональ</option>
                    </select>
                </div>
                
                <div class="setting-group">
                    <label>Цвет акцента:</label>
                    <input type="color" id="accentColor" value="#00d4ff">
                </div>
                
                <div class="setting-group">
                    <label>Прозрачность карточек:</label>
                    <input type="range" id="cardOpacity" min="0" max="1" step="0.1" value="0.15">
                    <span id="opacityValue">0.15</span>
                </div>
                
                <div class="setting-group">
                    <label>Скругление углов:</label>
                    <input type="range" id="borderRadius" min="0" max="30" value="15">
                    <span id="radiusValue">15px</span>
                </div>
                
                <button class="save-btn" onclick="saveDesign()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно: Админ-панель -->
    <div id="adminModal" class="modal">
        <div class="modal-content wide">
            <span class="close" onclick="document.getElementById('adminModal').style.display='none'">&times;</span>
            <h2>👑 Админ-панель</h2>
            
            <div class="admin-panel">
                <table class="users-table">
                    <thead>
                        <tr>
                            <th>Аватар</th>
                            <th>Никнейм</th>
                            <th>Роль</th>
                            <th>Статус</th>
                            <th>Соц. сеть</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <!-- Строки добавляются через JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Подключение скриптов -->
    <script src="js/notifications.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
