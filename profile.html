<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - SOTORIKO</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile-page.css">
</head>
<body>
    <div class="logo">
        <a href="index.html" style="text-decoration: none; color: var(--accent-color);">SOTORIKO</a>
    </div>

    <div class="profile-page">
        <div class="profile-container">
            <!-- Аватар и основная информация -->
            <div class="profile-header">
                <img id="profileAvatar" src="https://i.pravatar.cc/150?img=1" alt="Avatar" class="profile-avatar-large">
                <h1 id="profileUsername">Username</h1>
                <div class="profile-role" id="profileRole">Роль</div>
                <p id="profileBio" class="profile-bio">Описание профиля</p>
            </div>

            <!-- Настраиваемые блоки с ссылками -->
            <div class="profile-links" id="profileLinks">
                <!-- Ссылки добавляются динамически -->
            </div>

            <!-- Информация о профиле -->
            <div class="profile-info">
                <div class="info-item">
                    <span class="info-label">📅 Зарегистрирован:</span>
                    <span id="profileRegDate">01.01.2024</span>
                </div>
                <div class="info-item">
                    <span class="info-label">📊 Статус:</span>
                    <span id="profileStatus">Активен</span>
                </div>
            </div>

            <!-- Кнопка редактирования (только для владельца) -->
            <button id="editProfileBtn" class="edit-profile-btn" style="display: none;" onclick="openProfileEditor()">
                ✏️ Редактировать профиль
            </button>
        </div>
    </div>

    <!-- Модальное окно редактирования профиля -->
    <div id="profileEditorModal" class="modal">
        <div class="modal-content wide">
            <span class="close">&times;</span>
            <h2>✏️ Редактирование профиля</h2>
            
            <div class="editor-section">
                <h3>Основная информация</h3>
                <div class="editor-group">
                    <label>Аватар (URL):</label>
                    <input type="url" id="editAvatar" placeholder="https://...">
                </div>
                <div class="editor-group">
                    <label>Описание:</label>
                    <textarea id="editBio" rows="4" placeholder="Расскажите о себе..."></textarea>
                </div>
            </div>

            <div class="editor-section">
                <h3>🎨 Настройка дизайна карточки</h3>
                
                <div class="editor-group">
                    <label>Фон карточки (цвет/градиент):</label>
                    <select id="cardBgType">
                        <option value="color">Однотонный</option>
                        <option value="gradient">Градиент</option>
                    </select>
                </div>

                <div class="editor-group" id="colorPicker">
                    <label>Цвет фона:</label>
                    <input type="color" id="cardColor" value="#1a2847">
                </div>

                <div class="editor-group" id="gradientPicker" style="display: none;">
                    <label>Градиент:</label>
                    <input type="color" id="gradientColor1" value="#1a2847">
                    <input type="color" id="gradientColor2" value="#0a1628">
                    <select id="gradientAngle">
                        <option value="to bottom">↓ Сверху вниз</option>
                        <option value="to right">→ Слева направо</option>
                        <option value="135deg">↘ Диагональ</option>
                        <option value="to top">↑ Снизу вверх</option>
                    </select>
                </div>

                <div class="editor-group">
                    <label>Форма карточки:</label>
                    <select id="cardShape">
                        <option value="15">Скругленная (15px)</option>
                        <option value="25">Очень скругленная (25px)</option>
                        <option value="5">Немного скругленная (5px)</option>
                        <option value="0">Прямоугольная</option>
                    </select>
                </div>

                <div class="editor-group">
                    <label>Прозрачность карточки:</label>
                    <input type="range" id="cardTransparency" min="0" max="1" step="0.1" value="0.2">
                    <span id="transparencyValue">0.2</span>
                </div>
            </div>

            <div class="editor-section">
                <h3>🔗 Социальные сети</h3>
                <div id="socialLinksEditor">
                    <!-- Динамически добавляемые поля -->
                </div>
                <button class="add-link-btn" onclick="addSocialLink()">➕ Добавить ссылку</button>
            </div>

            <button class="save-btn" onclick="saveProfile()">💾 Сохранить изменения</button>
        </div>
    </div>

    <script src="js/profile-page.js"></script>
</body>
</html>
